services:
  - type: web
    # Render deploys the backend from its Dockerfile.
    name: stocktrack-api
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        # Render injects the managed PostgreSQL connection string.
        fromDatabase:
          name: stocktrack-db
          property: connectionString
      - key: CORS_ORIGINS
        sync: false
      - key: LOW_STOCK_THRESHOLD
        value: "10"

databases:
  - name: stocktrack-db
    # Free PostgreSQL database for the deployed API.
    plan: free
    databaseName: inventory_db
    user: inventory_user
